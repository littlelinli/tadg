<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Digital Circus Game</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            transition: filter 0.3s;
            background: #000;
        }

        /* 🎬 ЭКРАН СТАРТА   */
        #startScreen {
            position: absolute;
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("https://images.unsplash.com/photo-1520975958225-9e8c9a3c1d36?auto=format&fit=crop&w=1200&q=60");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        #startScreen h1 {
            font-size: 60px;
            text-shadow: 4px 4px 10px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #ff4757;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.1);
            background: #ff6b81;
        }

        /* 🎮 ИГРОВОЕ ПОЛЕ */
        #game {
            display: none;
            width: 100%;
            height: 100vh;
            background: #111;
            position: relative;
        }

        /* КОНТЕЙНЕР ДЛЯ ПЕРСОНАЖА */
        .char {
            width: 100px;  /* Размер картинки */
            height: 100px;
            position: absolute;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        .char:active {
            transform: scale(0.8);
        }

        /* ⚙️ НАСТРОЙКИ */
        #settings {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 15px;
            display: none;
            z-index: 5;
        }

        #settings button {
            padding: 8px 12px;
            font-size: 12px;
            margin: 2px;
        }
    </style>
</head>

<body>

    <div id="startScreen">
        <h1>🎪 DIGITAL CIRCUS</h1>
        <button onclick="startGame()">▶ PLAY</button>
    </div>

    <div id="game">
        <div id="settings">
            <button onclick="toggleSound()">🔊 Sound</button>
            <button onclick="brightnessDown()">🌙 - Dark</button>
            <button onclick="brightnessUp()">☀️ + Bright</button>
        </div>
    </div>

    <script>
        const game = document.getElementById("game");
        const startScreen = document.getElementById("startScreen");
        const settings = document.getElementById("settings");

        // Список персонажей (файлы должны называться точно так же: caine.png и т.д.)
        const chars = ["caine", "pomni", "Ragatha", "jax", "Gangle", "Zooble"];

        let soundOn = true;
        let brightness = 1;
        let interval;

        // 🎵 Простая музыка
        let audioCtx;
        let osc;

        function startMusic() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();

            osc.type = "square";
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            gain.gain.value = 0.02;

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();

            setInterval(() => {
                if (!soundOn) return;
                let notes = [220, 330, 440, 330, 550, 440];
                osc.frequency.setValueAtTime(
                    notes[Math.floor(Math.random() * notes.length)],
                    audioCtx.currentTime
                );
            }, 400);
        }

        function spawn() {
            let el = document.createElement("div");
            el.className = "char";

            // Выбираем случайное имя
            let name = chars[Math.floor(Math.random() * chars.length)];

            // Создаем картинку
            let img = document.createElement("img");
            img.src = `${name}.png`; 
            img.style.width = "100%";
            img.style.height = "100%";
            img.style.objectFit = "contain";
            img.style.pointerEvents = "none"; // Чтобы клик шел на div

            el.appendChild(img);

            // Случайная позиция (с отступом 100px, чтобы не вылетали за край)
            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 100);
            
            el.style.left = x + "px";
            el.style.top = y + "px";

            // Клик — удаление
            el.onclick = () => {
                el.remove();
            };

            game.appendChild(el);

            // Исчезновение через 2 секунды
            setTimeout(() => {
                if (el.parentNode) el.remove();
            }, 2000);
        }

        function startGame() {
            startScreen.style.display = "none";
            game.style.display = "block";
            settings.style.display = "block";

            // Запуск музыки только после клика (требование браузеров)
            startMusic();

            // Создаем персонажа каждые 600мс
            interval = setInterval(spawn, 600);
        }

        // --- Управление настройками ---

        function toggleSound() {
            soundOn = !soundOn;
        }

        function brightnessDown() {
            brightness -= 0.2;
            if (brightness < 0.2) brightness = 0.2;
            document.body.style.filter = `brightness(${brightness})`;
        }

        function brightnessUp() {
            brightness += 0.2;
            if (brightness > 1.5) brightness = 1.5;
            document.body.style.filter = `brightness(${brightness})`;
        }
    </script>

</body>
</html>
